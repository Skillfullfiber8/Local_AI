<!DOCTYPE html>
<html>
<head>
  <title>Heisenberg Local AI</title>
  <style>
    body { font-family: Arial; max-width: 700px; margin: auto; }
    #chat { margin-top: 20px; }
    .user { color: blue; }
    .ai { color: green; }
    textarea { width: 100%; height: 60px; }
    button { margin-top: 5px; }
  </style>
</head>
<body>

  <h2>Local Llama3:8B Chat</h2>

  <textarea id="msg" placeholder="Ask something..."></textarea>
  <button onclick="send()">Send</button>
  <button onclick="resetChat()">Reset</button>

  <div id="chat"></div>

  <script>
    const SERVER = "http://192.168.0.161:5000"; // CHANGE THIS

    async function send() {
      const msgBox = document.getElementById("msg");
      const message = msgBox.value;
      if (!message) return;

      document.getElementById("chat").innerHTML +=
        `<p class="user"><b>You:</b> ${message}</p>`;

      msgBox.value = "";

      const res = await fetch(`${SERVER}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
      });

      const data = await res.json();

      document.getElementById("chat").innerHTML +=
        `<p class="ai"><b>AI:</b> ${data.reply}</p>`;
    }

    async function resetChat() {
      await fetch(`${SERVER}/reset`, { method: "POST" });
      document.getElementById("chat").innerHTML = "";
    }
  </script>

</body>
</html>
