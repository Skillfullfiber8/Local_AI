<!DOCTYPE html>
<html>
<head>
  <title>Local AI Voice Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>Local AI Voice Assistant</header>

  <div id="chat"></div>

  <div id="inputArea">
    <input id="msg" placeholder="Ask something..." />
    <button onclick="startVoice()">🎤</button>
    <button onclick="send()">Send</button>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const msgBox = document.getElementById("msg");

    async function send() {
      const message = msgBox.value.trim();
      if (!message) return;

      addMessage(message, "user");
      msgBox.value = "";

      const aiMessageElement = addMessage("Typing...", "ai", true);

      const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();

      aiMessageElement.textContent = "";
      aiMessageElement.classList.remove("typing");

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value);
        aiMessageElement.textContent += chunk;
        chat.scrollTop = chat.scrollHeight;
      }

      speak(aiMessageElement.textContent);
    }

    function addMessage(text, type, isTyping = false) {
      const div = document.createElement("div");
      div.className = `message ${type}`;
      if (isTyping) div.classList.add("typing");
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    msgBox.addEventListener("keydown", function(e) {
      if (e.key === "Enter") send();
    });

    // 🎤 Speech Recognition
    let recognition;

    function startVoice() {
      if (!('webkitSpeechRecognition' in window)) {
        alert("Speech recognition not supported in this browser.");
        return;
      }

      recognition = new webkitSpeechRecognition();
      recognition.lang = "en-US";
      recognition.continuous = false;
      recognition.interimResults = false;

      recognition.onstart = () => {
        console.log("Listening...");
      };

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        msgBox.value = transcript;
        send();
      };

      recognition.onerror = (event) => {
        console.error("Speech recognition error:", event.error);
      };

      recognition.start();
    }

    // 🔊 Text-to-Speech
    function speak(text) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 1;
      utterance.pitch = 1;
      utterance.volume = 1;
      speechSynthesis.speak(utterance);
    }

  </script>

</body>
</html>
