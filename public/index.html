<!DOCTYPE html>
<html>
<head>
  <title>Offline Voice AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>Offline Voice AI</header>

<div id="chatContainer">
  <div id="chat"></div>
</div>

<div id="inputArea">
  <div id="inputWrapper">
    <button id="micBtn" onclick="startVoice()">🎙</button>
    <textarea id="msg" rows="1" placeholder="Message AI... / Say Hey Jarvis..."></textarea>
    <button id="sendBtn" onclick="send()">➤</button>
  </div>
</div>

<script>

const chat = document.getElementById("chat");
const msgBox = document.getElementById("msg");

/* ===============================
   ENTER TO SEND
================================= */
msgBox.addEventListener("keydown", function (e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

msgBox.addEventListener("input", function () {
  this.style.height = "auto";
  this.style.height = this.scrollHeight + "px";
});

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = `message ${type}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

/* ===============================
   WAKE WORD POLLING
================================= */

let wakeHandled = false;

setInterval(async () => {
  try {
    const res = await fetch("/wake-status", { cache: "no-store" });
    const data = await res.json();

    if (data.wake && !wakeHandled && !isRecording) {
      wakeHandled = true;
      playWakeSound();
      startVoice();
      setTimeout(() => { wakeHandled = false; }, 3000);
    }
  } catch (e) {
    // server unreachable, skip silently
  }
}, 300);

function playWakeSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.frequency.value = 880;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(() => { osc.stop(); ctx.close(); }, 150);
}

/* ===============================
   TTS ENGINE
================================= */

let isSpeaking = false;
let streamFinished = false;
let remainingText = "";

async function speak(text) {
  isSpeaking = true;

  try {
    const response = await fetch("/voice-output", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });

    const blob = await response.blob();
    const audio = new Audio(URL.createObjectURL(blob));

    audio.onended = async () => {
      isSpeaking = false;

      // If streaming ended and leftover exists → speak all remaining at once
      if (streamFinished && remainingText.trim().length > 0) {
        const finalBlock = remainingText.trim();
        remainingText = "";
        await speak(finalBlock);
      }
    };

    audio.onerror = () => {
      isSpeaking = false;
    };

    audio.play();

  } catch (e) {
    console.error("TTS error:", e);
    isSpeaking = false;
  }
}

/* ===============================
   STREAMING CHAT (HYBRID MODE)
================================= */

async function send() {
  const message = msgBox.value.trim();
  if (!message) return;

  addMessage(message, "user");
  msgBox.value = "";
  msgBox.style.height = "auto";

  const aiDiv = addMessage("Thinking...", "ai");
  aiDiv.classList.add("glow");

  streamFinished = false;
  remainingText = "";
  isSpeaking = false;

  const response = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  });

  const reader = response.body.getReader();
  const decoder = new TextDecoder();

  let firstChunk = true;
  let buffer = "";

  // ✅ 'g' flag is critical — without it regex.exec() loops infinitely
  const sentenceRegex = /[^.!?]+[.!?]+/g;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    const chunk = decoder.decode(value);

    if (firstChunk) {
      aiDiv.textContent = "";
      firstChunk = false;
    }

    aiDiv.textContent += chunk;
    buffer += chunk;

    // ✅ Reset lastIndex before scanning each new buffer
    sentenceRegex.lastIndex = 0;

    let match;
    let lastIndex = 0;

    while ((match = sentenceRegex.exec(buffer)) !== null) {
      const sentence = match[0].trim();
      lastIndex = sentenceRegex.lastIndex;

      if (!isSpeaking) {
        speak(sentence);
      } else {
        remainingText += " " + sentence;
      }
    }

    // ✅ Only remove matched portions from buffer
    if (lastIndex > 0) {
      buffer = buffer.slice(lastIndex).trim();
    }

    chat.scrollTop = chat.scrollHeight;
  }

  aiDiv.classList.remove("glow");
  streamFinished = true;

  // Speak any leftover text that had no sentence-ending punctuation
  if (buffer.trim().length > 0) {
    remainingText += " " + buffer.trim();
  }

  if (!isSpeaking && remainingText.trim().length > 0) {
    const finalBlock = remainingText.trim();
    remainingText = "";
    speak(finalBlock);
  }
}

/* ===============================
   VOICE INPUT (SILENCE STOP)
================================= */

let mediaRecorder;
let audioChunks = [];
let isRecording = false;

async function startVoice() {
  if (isRecording) return;

  const micBtn = document.getElementById("micBtn");
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  const audioContext = new AudioContext();
  const source = audioContext.createMediaStreamSource(stream);
  const analyser = audioContext.createAnalyser();

  analyser.fftSize = 2048;
  source.connect(analyser);

  const dataArray = new Uint8Array(analyser.fftSize);

  mediaRecorder = new MediaRecorder(stream);
  audioChunks = [];

  let silenceStart = null;
  const SILENCE_THRESHOLD = 8;
  const SILENCE_DURATION = 1500;

  function detectSilence() {
    analyser.getByteTimeDomainData(dataArray);

    let sum = 0;
    for (let i = 0; i < dataArray.length; i++) {
      const value = (dataArray[i] - 128) / 128;
      sum += value * value;
    }

    const rms = Math.sqrt(sum / dataArray.length) * 100;

    if (rms < SILENCE_THRESHOLD) {
      if (!silenceStart) silenceStart = Date.now();
      if (Date.now() - silenceStart > SILENCE_DURATION) {
        if (mediaRecorder.state === "recording") {
          mediaRecorder.stop();
        }
      }
    } else {
      silenceStart = null;
    }

    if (isRecording) requestAnimationFrame(detectSilence);
  }

  mediaRecorder.ondataavailable = e => {
    audioChunks.push(e.data);
  };

  mediaRecorder.onstop = async () => {
    micBtn.classList.remove("recording");
    isRecording = false;

    stream.getTracks().forEach(track => track.stop());
    audioContext.close();

    const blob = new Blob(audioChunks);

    const response = await fetch("/voice-input", {
      method: "POST",
      body: blob
    });

    const data = await response.json();
    msgBox.value = data.text;
    send();
  };

  mediaRecorder.start();
  isRecording = true;
  micBtn.classList.add("recording");

  detectSilence();
}

</script>
</body>
</html>
