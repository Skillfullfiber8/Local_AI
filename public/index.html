<!DOCTYPE html>
<html>
<head>
  <title>Offline Voice AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>Offline Voice AI</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="msg" placeholder="Ask something..." />
  <button onclick="startVoice()">🎤</button>
  <button onclick="send()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const msgBox = document.getElementById("msg");

function addMessage(text, type, typing=false) {
  const div = document.createElement("div");
  div.className = `message ${type}`;
  if (typing) div.classList.add("typing");
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const message = msgBox.value.trim();
  if (!message) return;

  addMessage(message, "user");
  msgBox.value = "";

  const aiMessage = addMessage("Thinking...", "ai", true);

  const response = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  });

  const reader = response.body.getReader();
  const decoder = new TextDecoder();

  aiMessage.textContent = "";
  aiMessage.classList.remove("typing");

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    aiMessage.textContent += decoder.decode(value);
    chat.scrollTop = chat.scrollHeight;
  }

  speak(aiMessage.textContent);
}

/* =====================
   PUSH-TO-TALK
===================== */
let mediaRecorder;
let audioChunks = [];
let isRecording = false;

async function startVoice() {
  if (!isRecording) {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];

    mediaRecorder.ondataavailable = e => {
      audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      const blob = new Blob(audioChunks);

      const response = await fetch("/voice-input", {
        method: "POST",
        body: blob
      });

      const data = await response.json();
      msgBox.value = data.text;
      send();
    };

    mediaRecorder.start();
    isRecording = true;
    console.log("Recording started");

  } else {
    mediaRecorder.stop();
    isRecording = false;
    console.log("Recording stopped");
  }
}

/* =====================
   PLAY PIPER AUDIO
===================== */
async function speak(text) {
  const response = await fetch("/voice-output", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  });

  const blob = await response.blob();
  const audio = new Audio(URL.createObjectURL(blob));
  audio.play();
}
</script>

</body>
</html>
